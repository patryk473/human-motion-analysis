<!DOCTYPE html>
<html>
<head
	<meta charset="UTF-8"> 
	<title>ESP32 IMU</title>
</head>
<body>
	<h1>Dane IMU</h1>
	<pre id="out">Ładowanie...</pre>

	<script>
		const ESP_IP = "http://192.168.233.26"; // ← WPISZ IP ESP32
		async function getData() {
			const res = await fetch(ESP_IP + "/data");
			const data = await res.json();

			document.getElementById("out").textContent =
				AX: ${data.ax}\AY: ${data.ay}\nAZ: ${data.az}\n\n +
				GX: ${data.gx}\nGY: ${data.gy}\nGZ: ${data.gz}\n\n +
				TS: ${data.ts}; 
		} 

			setInterval(getData, 100); // 10 Hz
	</script>
</body
 </html>
